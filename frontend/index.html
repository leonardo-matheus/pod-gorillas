<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Pod Gorillas - Sua loja de PODs em Matão. Entrega rápida, pagamento PIX." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Pod Gorillas | PODs em Matão</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; }
      #root { min-height: 100vh; }
      .preloader {
        position: fixed; inset: 0; background: #0a0a0f;
        display: flex; align-items: center; justify-content: center; z-index: 9999;
      }
      .preloader img { width: 80px; animation: pulse 1s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader">
        <img src="/logo-192.png" alt="Carregando..." style="border-radius: 24px;" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
