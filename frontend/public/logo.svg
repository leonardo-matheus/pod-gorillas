<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0f0f16"/>
    </linearGradient>
    <linearGradient id="gorillaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <!-- Filtro de sombra -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>

  <!-- Glow effect atrás do gorila -->
  <ellipse cx="100" cy="110" rx="55" ry="50" fill="url(#glowGradient)"/>

  <!-- Cabeça do gorila - formato mais realista -->
  <path d="M100 45
           C65 45 48 75 48 105
           C48 135 60 150 75 158
           L75 170 L88 170 L88 158
           C93 160 97 161 100 161
           C103 161 107 160 112 158
           L112 170 L125 170 L125 158
           C140 150 152 135 152 105
           C152 75 135 45 100 45"
        fill="url(#gorillaGradient)" filter="url(#glow)"/>

  <!-- Sobrancelhas/Testa proeminente -->
  <ellipse cx="100" cy="72" rx="35" ry="12" fill="#16a34a"/>

  <!-- Área dos olhos (escura) -->
  <ellipse cx="75" cy="82" rx="18" ry="16" fill="#0a0a0f"/>
  <ellipse cx="125" cy="82" rx="18" ry="16" fill="#0a0a0f"/>

  <!-- Olhos brancos -->
  <ellipse cx="75" cy="82" rx="10" ry="11" fill="#ffffff"/>
  <ellipse cx="125" cy="82" rx="10" ry="11" fill="#ffffff"/>

  <!-- Pupilas -->
  <circle cx="78" cy="81" r="5" fill="#0a0a0f"/>
  <circle cx="128" cy="81" r="5" fill="#0a0a0f"/>

  <!-- Brilho nos olhos -->
  <circle cx="80" cy="79" r="2" fill="#ffffff"/>
  <circle cx="130" cy="79" r="2" fill="#ffffff"/>

  <!-- Focinho/Nariz - área elevada -->
  <ellipse cx="100" cy="115" rx="28" ry="22" fill="#15803d"/>

  <!-- Narinas -->
  <ellipse cx="90" cy="110" rx="6" ry="5" fill="#0a0a0f"/>
  <ellipse cx="110" cy="110" rx="6" ry="5" fill="#0a0a0f"/>

  <!-- Boca -->
  <path d="M85 125 Q100 135 115 125" stroke="#0a0a0f" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Fumaça/Vapor saindo - efeito vape -->
  <g opacity="0.7" filter="url(#glow)">
    <circle cx="140" cy="55" r="10" fill="#22c55e" opacity="0.4"/>
    <circle cx="155" cy="42" r="8" fill="#22c55e" opacity="0.3"/>
    <circle cx="165" cy="28" r="6" fill="#22c55e" opacity="0.2"/>
    <circle cx="148" cy="65" r="6" fill="#22c55e" opacity="0.3"/>
    <circle cx="160" cy="52" r="5" fill="#22c55e" opacity="0.2"/>
  </g>

  <!-- POD/Vape na mão (sutilmente sugerido) -->
  <rect x="135" y="90" width="8" height="25" rx="3" fill="#1a1a2e" stroke="#22c55e" stroke-width="1"/>
  <rect x="136" y="92" width="6" height="4" rx="1" fill="#22c55e" opacity="0.5"/>
</svg>
